<script type="text/javascript">
(function () {
    "use strict";

    /* Map 1 内的 msd 配置区 */
    var MSD_SECTION_ID = "cbi-iptv_manager-msd";
    /* Map 2 整体（rtp2httpd 的独立 Map，id = "cbi-rtp2httpd"） */
    var RTP_MAP_ID     = "cbi-rtp2httpd";
    /* 程序选择下拉框 name */
    var SELECTOR_NAME  = "cbid.iptv_manager.global.program";

    function toggle(value) {
        var msdEl  = document.getElementById(MSD_SECTION_ID);
        var rtpMap = document.getElementById(RTP_MAP_ID);

        if (value === "msd") {
            if (msdEl)  msdEl.style.display  = "";
            if (rtpMap) rtpMap.style.display  = "none";
        } else {
            if (msdEl)  msdEl.style.display  = "none";
            if (rtpMap) rtpMap.style.display  = "";
        }
    }

    function init() {
        var sel = document.querySelector('[name="' + SELECTOR_NAME + '"]');
        if (!sel) return;
        toggle(sel.value);
        sel.addEventListener("change", function () { toggle(this.value); });
    }

    document.readyState === "loading"
        ? document.addEventListener("DOMContentLoaded", init)
        : init();
})();
</script>
