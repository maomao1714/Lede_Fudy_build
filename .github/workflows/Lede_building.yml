name: 🏗️ DONGZAI 固件工厂

on:
  workflow_dispatch:
    inputs:
      device:
        description: '📦 目标设备'
        required: true
        default: 'wh3000pro'
        type: choice
        options:
          - wh3000        # 华硅 WH3000       · MT7981 ARM · 512MB
          - wh3000pro     # 华硅 WH3000 Pro   · MT7981 ARM · 512MB
          - re-sp-01b     # 京东云无线宝       · MT7621 MIPS · 256MB

env:
  LEDE_REPO:   https://github.com/coolsnowwolf/lede
  LEDE_BRANCH: master

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:

      - name: 🎯 DONGZAI 固件工厂
        run: |
          cat << 'EOF'

            ____   ___  _   _  ____ _____    _    ___ 
           |  _ \ / _ \| \ | |/ ___|__  /  / \  |_ _|
           | | | | | | |  \| | |  _ / /  / _ \  | | 
           | |_| | |_| | |\  | |_| |/ /__/ ___ \ | | 
           |____/ \___/|_| \_|\____/____/_/   \_\___|
                  🏗️  固件工厂  ·  OpenWrt / LEDE

          EOF

          DEVICE="${{ github.event.inputs.device }}"
          case "$DEVICE" in
            wh3000)
              DNAME="华硅 WH3000"
              DSPEC="MT7981 ARM · 512MB RAM · eMMC"
              ;;
            wh3000pro)
              DNAME="华硅 WH3000 Pro"
              DSPEC="MT7981 ARM · 512MB RAM · eMMC"
              ;;
            re-sp-01b)
              DNAME="京东云无线宝 RE-SP-01B"
              DSPEC="MT7621 MIPS · 256MB RAM · 128GB eMMC"
              ;;
          esac

          echo "  ┌─────────────────────────────────────────┐"
          echo "  │  📦 设备：$DNAME"
          echo "  │  🔧 规格：$DSPEC"
          echo "  │  🕐 时间：$(date '+%Y-%m-%d %H:%M:%S UTC')"
          echo "  │  🔖 标识：DONGZAI"
          echo "  └─────────────────────────────────────────┘"

      - name: 📥 检出仓库
        uses: actions/checkout@v4

      - name: 🧹 释放磁盘空间
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc \
                      /usr/local/lib/android \
                      /opt/hostedtoolcache/CodeQL
          sudo docker image prune -a -f
          sudo apt-get clean
          sudo swapoff -a || true
          sudo rm -f /swapfile
          echo "── 当前磁盘空间 ──"
          df -h

      - name: ⚙️ 初始化编译环境
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            build-essential clang flex bison \
            g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses5-dev libssl-dev \
            python3 python3-pyelftools rsync unzip \
            zlib1g-dev file wget curl ccache cmake \
            ninja-build jq rename libelf-dev \
            device-tree-compiler

      - name: 📦 克隆 LEDE 源码
        run: |
          git clone --depth=1 -b $LEDE_BRANCH $LEDE_REPO openwrt
          echo "── LEDE 最新提交 ──"
          git -C openwrt log --oneline -3

      - name: 🔧 DIY Part 1 - 配置 Feeds
        run: |
          chmod +x diy-part1.sh
          cd openwrt
          ../diy-part1.sh

      - name: 🔄 更新 & 安装 Feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: 🎛️ 加载设备配置
        run: |
          DEVICE="${{ github.event.inputs.device }}"
          echo "── 加载配置：${DEVICE}.config ──"

          case "$DEVICE" in
            wh3000)    cp wh3000.config    openwrt/.config ;;
            wh3000pro) cp wh3000pro.config openwrt/.config ;;
            re-sp-01b) cp re-sp-01b.config openwrt/.config ;;
          esac

          # 强制修正设备 TARGET：删除所有旧 DEVICE 行，只写当前设备
          case "$DEVICE" in
            wh3000)
              TARGET_LINE="CONFIG_TARGET_mediatek_filogic_DEVICE_huasifei_wh3000=y"
              ;;
            wh3000pro)
              TARGET_LINE="CONFIG_TARGET_mediatek_filogic_DEVICE_huasifei_wh3000-pro=y"
              ;;
            re-sp-01b)
              TARGET_LINE="CONFIG_TARGET_ramips_mt7621_DEVICE_jdcloud_re-sp-01b=y"
              ;;
          esac

          grep -v "CONFIG_TARGET_.*_DEVICE_" openwrt/.config \
            > /tmp/.config_patched
          echo "$TARGET_LINE" >> /tmp/.config_patched
          cp /tmp/.config_patched openwrt/.config

          echo "── 当前设备目标 ──"
          grep "DEVICE_" openwrt/.config

      - name: 🐧 强制启用 Linux 6.6 内核（仅限 ARM Filogic 平台）
        run: |
          DEVICE="${{ github.event.inputs.device }}"

          case "$DEVICE" in
            wh3000|wh3000pro)
              # ARM Filogic（MT7981）支持 Linux 6.6
              cat >> openwrt/.config << 'EOF'
          CONFIG_TESTING_KERNEL=y
          CONFIG_LINUX_6_6=y
          EOF
              echo "✅ Filogic ARM 平台：已启用 Linux 6.6"
              ;;
            re-sp-01b)
              # MT7621 MIPS：最高支持 5.x 内核，不能强制 6.6
              echo "⏭️ MT7621 MIPS 平台：跳过 Linux 6.6，使用默认内核"
              ;;
          esac

      - name: 🔧 DIY Part 2 - 文件定制
        run: |
          chmod +x diy-part2.sh
          cd openwrt
          ../diy-part2.sh

      - name: 📋 生成最终配置
        run: |
          cd openwrt
          make defconfig
          echo "── TARGET 配置 ──"
          grep "CONFIG_TARGET_" .config | head -10
          echo "── 内核版本 ──"
          grep "LINUX_6_6\|LINUX_5_" .config | head -5 || true

      - name: ⬇️ 下载编译依赖
        run: |
          cd openwrt
          make download -j8
          find dl -size -1024c -exec ls -l {} \; 2>/dev/null || true

      - name: 🔨 编译固件
        run: |
          cd openwrt
          echo "── 开始编译，CPU 核心：$(nproc) ──"
          make -j$(nproc) V=s 2>&1 | tee /tmp/build.log | \
            grep -E "^make\[|ERROR:|error:" || true

          # 若并行失败，降级单线程重试获取完整错误
          if [ ${PIPESTATUS[0]} -ne 0 ]; then
            echo "⚠️ 并行编译失败，单线程重试..."
            make -j1 V=s 2>&1 | tail -100
          fi

      - name: 📁 整理固件
        id: organize
        run: |
          mkdir -p upload

          find openwrt/bin/targets/ -type f \
            \( -name "*.bin" -o -name "*.img.gz" \
               -o -name "*.itb" -o -name "*.tar" \) \
            -exec cp {} upload/ \;

          cd upload
          for f in *; do
            newname=$(echo "$f" | sed 's/openwrt/DONGZAI/g; s/lede/DONGZAI/g')
            [ "$f" != "$newname" ] && mv "$f" "$newname"
          done

          echo "── 固件列表 ──"
          ls -lh

          [ -z "$(ls -A .)" ] && echo "⚠️ 警告：未找到固件文件" && exit 1

      - name: 📤 上传 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DONGZAI_${{ github.event.inputs.device }}_${{ github.run_number }}
          path: upload/
          retention-days: 7

      - name: 🏷️ 生成 Release 标签
        id: tag
        run: |
          DEVICE="${{ github.event.inputs.device }}"
          DATE=$(date +'%Y-%m-%d')
          TIME=$(date +'%H%M')
          TAG="DONGZAI-${DEVICE^^}-$(date +'%Y.%m.%d')-${TIME}"

          echo "release_tag=$TAG"   >> "$GITHUB_OUTPUT"
          echo "release_date=$DATE" >> "$GITHUB_OUTPUT"
          echo "生成 Tag：$TAG"

      - name: 🚀 发布到 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: "🏗️ DONGZAI · ${{ github.event.inputs.device }} · ${{ steps.tag.outputs.release_date }}"
          files: upload/*
          body: |
            ## 🏗️ DONGZAI 固件工厂

            | 项目 | 内容 |
            |---|---|
            | 📦 设备 | `${{ github.event.inputs.device }}` |
            | 🐧 内核 | Linux 6.6（Filogic）/ 5.x（MT7621） |
            | 📅 编译日期 | ${{ steps.tag.outputs.release_date }} |
            | 🔖 标识 | DONGZAI |

            ### 刷机注意
            - 首次刷入请先备份原厂固件
            - 建议使用 `sysupgrade` 命令升级，勿勾选保留配置

            ---
            🤖 由 GitHub Actions 自动编译 · DONGZAI 固件工厂
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
