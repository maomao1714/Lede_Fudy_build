name: 🏗️ DONGZAI 固件工厂

on:
  workflow_dispatch:
    inputs:
      device:
        description: '📦 目标设备'
        required: true
        default: 'wh3000pro'
        type: choice
        options:
          - wh3000        # 华硅 WH3000       · MT7981 · 512MB
          - wh3000pro     # 华硅 WH3000 Pro   · MT7981 · 512MB
          - re-sp-01b     # 京东云无线宝       · MT7981 · 256MB

env:
  LEDE_REPO:   https://github.com/coolsnowwolf/lede
  LEDE_BRANCH: master

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:

      # ══════════════════════════════════════════════
      #  BANNER
      # ══════════════════════════════════════════════
      - name: 🎯 DONGZAI 固件工厂
        run: |
          cat << 'EOF'

            ____   ___  _   _  ____ _____    _    ___ 
           |  _ \ / _ \| \ | |/ ___|__  /  / \  |_ _|
           | | | | | | |  \| | |  _ / /  / _ \  | | 
           | |_| | |_| | |\  | |_| |/ /__/ ___ \ | | 
           |____/ \___/|_| \_|\____/____/_/   \_\___|
                  🏗️  固件工厂  ·  OpenWrt / LEDE

          EOF

          DEVICE="${{ github.event.inputs.device }}"
          case "$DEVICE" in
            wh3000)
              DNAME="华硅 WH3000"
              DSPEC="MT7981 · 512MB RAM · eMMC"
              ;;
            wh3000pro)
              DNAME="华硅 WH3000 Pro"
              DSPEC="MT7981 · 512MB RAM · eMMC"
              ;;
            re-sp-01b)
              DNAME="京东云无线宝 RE-SP-01B"
              DSPEC="MT7981 · 256MB RAM · 128GB eMMC（精简配置）"
              ;;
          esac

          echo "  ┌─────────────────────────────────────────┐"
          echo "  │  📦 设备：$DNAME"
          echo "  │  🔧 规格：$DSPEC"
          echo "  │  🕐 时间：$(date '+%Y-%m-%d %H:%M:%S UTC')"
          echo "  │  🔖 标识：DONGZAI"
          echo "  └─────────────────────────────────────────┘"

      # ══════════════════════════════════════════════
      #  检出仓库
      # ══════════════════════════════════════════════
      - name: 📥 检出仓库
        uses: actions/checkout@v4

      # ══════════════════════════════════════════════
      #  释放磁盘空间
      # ══════════════════════════════════════════════
      - name: 🧹 释放磁盘空间
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc \
                      /usr/local/lib/android \
                      /opt/hostedtoolcache/CodeQL
          sudo docker image prune -a -f
          sudo apt-get clean
          sudo swapoff -a || true
          sudo rm -f /swapfile
          echo "── 当前磁盘空间 ──"
          df -h

      # ══════════════════════════════════════════════
      #  初始化环境
      # ══════════════════════════════════════════════
      - name: ⚙️ 初始化编译环境
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            build-essential clang flex bison \
            g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses5-dev libssl-dev \
            python3 python3-pyelftools rsync unzip \
            zlib1g-dev file wget curl ccache cmake \
            ninja-build jq rename libelf-dev \
            device-tree-compiler

      # ══════════════════════════════════════════════
      #  克隆 LEDE 源码
      # ══════════════════════════════════════════════
      - name: 📦 克隆 LEDE 源码
        run: |
          git clone --depth=1 -b $LEDE_BRANCH $LEDE_REPO openwrt
          echo "── LEDE 版本 ──"
          git -C openwrt log --oneline -3

      # ══════════════════════════════════════════════
      #  DIY Part 1（添加 feeds）
      # ══════════════════════════════════════════════
      - name: 🔧 DIY Part 1 - 配置 Feeds
        run: |
          chmod +x diy-part1.sh
          cd openwrt
          ../diy-part1.sh

      # ══════════════════════════════════════════════
      #  更新 & 安装 Feeds
      # ══════════════════════════════════════════════
      - name: 🔄 更新 & 安装 Feeds
        run: |
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      # ══════════════════════════════════════════════
      #  加载设备配置
      # ══════════════════════════════════════════════
      - name: 🎛️ 加载设备配置
        run: |
          DEVICE="${{ github.event.inputs.device }}"
          echo "── 加载配置：${DEVICE}.config ──"

          case "$DEVICE" in
            wh3000)      cp wh3000.config      openwrt/.config ;;
            wh3000pro)   cp wh3000pro.config   openwrt/.config ;;
            re-sp-01b)   cp re-sp-01b.config   openwrt/.config ;;
          esac

          echo "── 配置加载完成 ──"
          head -5 openwrt/.config

      # ══════════════════════════════════════════════
      #  强制启用 6.6 内核
      # ══════════════════════════════════════════════
      - name: 🐧 强制启用 Linux 6.6 内核
        run: |
          cat >> openwrt/.config << 'EOF'
          CONFIG_TESTING_KERNEL=y
          CONFIG_LINUX_6_6=y
          EOF

      # ══════════════════════════════════════════════
      #  DIY Part 2（文件定制）
      # ══════════════════════════════════════════════
      - name: 🔧 DIY Part 2 - 文件定制
        run: |
          chmod +x diy-part2.sh
          cd openwrt
          ../diy-part2.sh

      # ══════════════════════════════════════════════
      #  生成最终配置
      # ══════════════════════════════════════════════
      - name: 📋 生成最终配置
        run: |
          cd openwrt
          make defconfig
          echo "── TARGET 配置 ──"
          grep "CONFIG_TARGET_" .config | head -10
          echo "── 内核版本 ──"
          grep "LINUX_6_6" .config || echo "（未找到 6.6 内核配置）"

      # ══════════════════════════════════════════════
      #  下载编译依赖
      # ══════════════════════════════════════════════
      - name: ⬇️ 下载编译依赖
        run: |
          cd openwrt
          make download -j8
          echo "── 下载完成，检查大文件 ──"
          find dl -size -1024c -exec ls -l {} \;

      # ══════════════════════════════════════════════
      #  编译固件
      # ══════════════════════════════════════════════
      - name: 🔨 编译固件
        id: compile
        run: |
          cd openwrt
          DEVICE="${{ github.event.inputs.device }}"

          echo "── 开始编译：$DEVICE ──"
          echo "── CPU 核心数：$(nproc) ──"

          # 并行编译，失败后降级单线程重试以获得完整错误信息
          make -j$(nproc) V=s 2>&1 | tee /tmp/build.log | \
            grep -E "^make|error:|warning:|ERROR" || \
          make -j1 V=s 2>&1 | tail -100

          echo "── 编译完成 ──"

      # ══════════════════════════════════════════════
      #  整理固件
      # ══════════════════════════════════════════════
      - name: 📁 整理固件
        id: organize
        run: |
          DEVICE="${{ github.event.inputs.device }}"
          mkdir -p upload

          find openwrt/bin/targets/ -type f \
            \( -name "*.bin" -o -name "*.img.gz" \
               -o -name "*.itb" -o -name "*.tar" \) \
            -exec cp {} upload/ \;

          # 统一重命名：openwrt → DONGZAI
          cd upload
          for f in *; do
            newname=$(echo "$f" | \
              sed "s/openwrt/DONGZAI/g" | \
              sed "s/lede/DONGZAI/g")
            [ "$f" != "$newname" ] && mv "$f" "$newname"
          done

          echo "── 固件列表 ──"
          ls -lh

          # 记录固件名用于 Release
          echo "DEVICE=$DEVICE" >> "$GITHUB_OUTPUT"

      # ══════════════════════════════════════════════
      #  上传 Artifact
      # ══════════════════════════════════════════════
      - name: 📤 上传 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: DONGZAI_${{ github.event.inputs.device }}_${{ github.run_number }}
          path: upload/
          retention-days: 7

      # ══════════════════════════════════════════════
      #  生成 Release Tag
      # ══════════════════════════════════════════════
      - name: 🏷️ 生成 Release 标签
        id: tag
        run: |
          DEVICE="${{ github.event.inputs.device }}"
          TAG="DONGZAI-${DEVICE^^}-6.6-$(date +'%Y.%m.%d-%H%M')"
          echo "release_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "生成 Tag：$TAG"

      # ══════════════════════════════════════════════
      #  发布 Release
      # ══════════════════════════════════════════════
      - name: 🚀 发布到 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: "🏗️ DONGZAI · ${{ github.event.inputs.device }} · $(date +'%Y-%m-%d')"
          files: upload/*
          body: |
            ## 🏗️ DONGZAI 固件工厂

            | 项目 | 内容 |
            |---|---|
            | 📦 设备 | `${{ github.event.inputs.device }}` |
            | 🐧 内核 | Linux 6.6 |
            | 📅 编译时间 | `${{ github.run_id }}` |
            | 🔖 标识 | DONGZAI |

            ### 刷机注意
            - 首次刷入请先备份原厂固件
            - 建议使用 `sysupgrade` 命令升级，勿勾选保留配置

            ---
            🤖 由 GitHub Actions 自动编译 · DONGZAI 固件工厂
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
