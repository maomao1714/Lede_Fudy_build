name: 编译 Fudy_pro 固件（WH3000pro系列）

on:
  workflow_dispatch:
    inputs:
      device:
        description: '选择设备'
        required: true
        default: 'wh3000'
        type: choice
        options:
          - wh3000
          - wh3000pro

jobs:
  build:
    runs-on: ubuntu-22.04

    permissions:
      contents: write

    steps:

    # =========================
    # 检出仓库
    # =========================
    - name: 检出仓库
      uses: actions/checkout@v4

    # =========================
    # 释放磁盘空间
    # =========================
    - name: 释放磁盘空间
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/hostedtoolcache/CodeQL

        sudo docker image prune -a -f

        sudo apt-get clean
        sudo swapoff -a || true
        sudo rm -f /swapfile

        df -h

    # =========================
    # 初始化环境
    # =========================
    - name: 初始化编译环境
      run: |
        sudo apt-get update

        sudo apt-get install -y \
          build-essential \
          clang \
          flex \
          bison \
          g++ \
          gawk \
          gcc-multilib \
          g++-multilib \
          gettext \
          git \
          libncurses5-dev \
          libssl-dev \
          python3 \
          python3-pyelftools \
          rsync \
          unzip \
          zlib1g-dev \
          file \
          wget \
          curl \
          ccache \
          cmake \
          ninja-build \
          jq \
          rename \
          libelf-dev \
          device-tree-compiler

    # =========================
    # 克隆 LEDE
    # =========================
    - name: 克隆 LEDE 源码
      run: |
        git clone --depth=1 -b master https://github.com/coolsnowwolf/lede openwrt

    # =========================
    # DIY1
    # =========================
    - name: 执行 DIY1
      run: |
        chmod +x diy-part1.sh
        cd openwrt
        ../diy-part1.sh

    # =========================
    # 更新 feeds
    # =========================
    - name: 更新 feeds
      run: |
        cd openwrt

        ./scripts/feeds update -a
        ./scripts/feeds install -a

    # =========================
    # 加载设备配置
    # =========================
    - name: 加载设备配置
      run: |
        DEVICE="${{ github.event.inputs.device }}"

        echo "当前设备: $DEVICE"

        if [ "$DEVICE" = "wh3000" ]; then
          cp wh3000.config openwrt/.config
        else
          cp wh3000pro.config openwrt/.config
        fi

    # =========================
    # 强制启用 6.6 内核
    # =========================
    - name: 强制启用 6.6 内核
      run: |
        cat >> openwrt/.config << EOF
        CONFIG_TESTING_KERNEL=y
        CONFIG_LINUX_6_6=y
        EOF

    # =========================
    # DIY2
    # =========================
    - name: 执行 DIY2
      run: |
        chmod +x diy-part2.sh
        cd openwrt
        ../diy-part2.sh

    # =========================
    # defconfig
    # =========================
    - name: 加载配置
      run: |
        cd openwrt
        make defconfig

    # =========================
    # 查看目标平台
    # =========================
    - name: 查看目标平台
      run: |
        grep "CONFIG_TARGET_" openwrt/.config | head -20

    # =========================
    # 查看内核配置
    # =========================
    - name: 查看内核配置
      run: |
        grep "LINUX_6_6" openwrt/.config || true

    # =========================
    # 下载 dl
    # =========================
    - name: 下载 dl
      run: |
        cd openwrt
        make download -j8

    # =========================
    # 编译
    # =========================
    - name: 编译固件
      run: |
        cd openwrt
        make -j2 V=s

    # =========================
    # 整理固件
    # =========================
    - name: 整理固件
      run: |
        mkdir -p upload

        find openwrt/bin/targets/ -type f \
          \( -name "*.bin" -o -name "*.img.gz" -o -name "*.itb" -o -name "*.tar" \) \
          -exec cp {} upload/ \;

        cd upload

        for file in *; do
          newname=$(echo "$file" | sed 's/openwrt/LEDE/g')
          mv "$file" "$newname"
        done

        ls -lh

    # =========================
    # 上传 Artifact
    # =========================
    - name: 上传 Artifact
      uses: actions/upload-artifact@v4
      with:
        name: LEDE_${{ github.event.inputs.device }}
        path: upload/

    # =========================
    # 生成 Release 标签
    # =========================
    - name: 生成 Release 标签
      id: tag
      run: |
        echo "release_tag=LEDE-6.6-$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT

    # =========================
    # 发布 Release
    # =========================
    - name: 发布到 Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        files: upload/*
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
