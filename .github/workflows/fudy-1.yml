name: Fudy/Fudy-pro 固件（WH3000系列）

on:
  workflow_dispatch:
    inputs:
      device:
        description: '选择设备'
        required: true
        default: 'wh3000'
        type: choice
        options:
          - wh3000
          - wh3000pro
      clean_build:
        description: '强制全量编译（忽略缓存）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  build:
    runs-on: ubuntu-22.04

    permissions:
      contents: write

    steps:

    - name: 检出仓库
      uses: actions/checkout@v4

    - name: 释放磁盘空间
      run: |
        sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android
        sudo rm -rf /opt/hostedtoolcache/CodeQL
        sudo docker image prune -a -f
        sudo apt-get clean
        sudo swapoff -a || true
        sudo rm -f /swapfile
        df -h

    - name: 初始化编译环境
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y \
          build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git \
          libncurses5-dev libssl-dev python3 \
          python3-pyelftools rsync unzip zlib1g-dev \
          file wget curl ccache cmake ninja-build \
          jq rename libelf-dev device-tree-compiler

    - name: 克隆 LEDE 源码
      run: |
        git clone --depth=1 -b master \
          https://github.com/coolsnowwolf/lede openwrt

    - name: 执行 DIY1
      run: |
        chmod +x diy-part1.sh
        cd openwrt
        ../diy-part1.sh

    - name: 更新 feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 加载设备配置
      run: |
        DEVICE="${{ github.event.inputs.device }}"
        echo "当前设备: $DEVICE"
        if [ "$DEVICE" = "wh3000" ]; then
          cp wh3000.config openwrt/.config
        else
          cp wh3000pro.config openwrt/.config
        fi

    - name: 强制启用 6.6 内核
      run: |
        cat >> openwrt/.config << EOF
        CONFIG_TESTING_KERNEL=y
        CONFIG_LINUX_6_6=y
        EOF

    - name: 执行 DIY2
      run: |
        chmod +x diy-part2.sh
        cd openwrt
        ../diy-part2.sh

    - name: 加载配置
      run: |
        cd openwrt
        make defconfig

    # ★ 缓存工具链（最耗时的部分，约30分钟）
    # key 基于 LEDE commit hash，超过24小时会因 LEDE 更新而变化
    - name: 缓存工具链
      id: cache-toolchain
      uses: actions/cache@v4
      with:
        path: |
          openwrt/staging_dir/toolchain-*
          openwrt/staging_dir/host
          openwrt/build_dir/host
          openwrt/build_dir/hostpkg
        key: toolchain-${{ github.event.inputs.device }}-${{ hashFiles('openwrt/include/version.mk') }}-${{ hashFiles('openwrt/.config') }}
        restore-keys: |
          toolchain-${{ github.event.inputs.device }}-

    # ★ 缓存 dl 目录（软件包源码，约15分钟）
    # key 基于 config 文件，包列表变化时重新下载
    - name: 缓存下载目录
      id: cache-dl
      uses: actions/cache@v4
      with:
        path: openwrt/dl
        key: dl-${{ github.event.inputs.device }}-${{ hashFiles('**/wh3000*.config') }}-${{ hashFiles('diy-part1.sh') }}
        restore-keys: |
          dl-${{ github.event.inputs.device }}-

    - name: 下载 dl
      run: |
        cd openwrt
        make download -j8
        # 清理下载失败的碎片文件
        find dl -size -1024c -exec rm -f {} \; 2>/dev/null || true

    # ★ 智能编译：有缓存时只编译变化的包
    - name: 编译固件
      run: |
        cd openwrt
        CACHE_HIT="${{ steps.cache-toolchain.outputs.cache-hit }}"
        CLEAN="${{ github.event.inputs.clean_build }}"

        if [ "$CLEAN" = "true" ]; then
          echo ">>> 强制全量编译"
          make -j$(nproc) V=s
        elif [ "$CACHE_HIT" = "true" ]; then
          echo ">>> 工具链缓存命中，增量编译..."
          # 只重新编译 package 阶段，跳过工具链
          make package/compile -j$(nproc) V=s
          make package/index -j$(nproc) V=s
          make target/install -j$(nproc) V=s
          make checksum -j$(nproc) V=s
        else
          echo ">>> 无缓存，全量编译..."
          make -j$(nproc) V=s
        fi

    - name: 整理固件
      run: |
        mkdir -p upload
        find openwrt/bin/targets/ -type f \
          \( -name "*.bin" -o -name "*.img.gz" -o -name "*.itb" -o -name "*.tar" \) \
          -exec cp {} upload/ \;
        cd upload
        for file in *; do
          newname=$(echo "$file" | sed 's/openwrt/LEDE/g')
          mv "$file" "$newname"
        done
        ls -lh

    - name: 上传 Artifact
      uses: actions/upload-artifact@v4
      with:
        name: LEDE_${{ github.event.inputs.device }}
        path: upload/

    - name: 生成 Release 标签
      id: tag
      run: |
        echo "release_tag=LEDE-6.6-$(date +'%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT

    - name: 发布到 Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.tag.outputs.release_tag }}
        files: upload/*
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
