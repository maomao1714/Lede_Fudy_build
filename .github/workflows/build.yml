name: Fudy OpenWrt 极速编译（WH3000 PRO）

on:
  workflow_dispatch:
    inputs:
      device:
        type: choice
        required: true
        default: wh3000
        options: [wh3000, wh3000pro]

      clean_build:
        type: choice
        default: "false"
        options: ["false", "true"]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:

    - uses: actions/checkout@v4

    # ======================
    # 🧹 环境瘦身
    # ======================
    - name: 释放空间
      run: |
        sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android
        sudo apt-get clean
        df -h

    # ======================
    # 📦 基础依赖
    # ======================
    - name: 安装依赖
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
          python3 python3-pyelftools rsync unzip zlib1g-dev file wget curl \
          ccache cmake ninja-build jq rename libelf-dev device-tree-compiler

    # ======================
    # 📥 源码
    # ======================
    - name: clone lede
      run: |
        git clone --depth=1 -b master https://github.com/coolsnowwolf/lede openwrt

    # ======================
    # 🧩 DIY1
    # ======================
    - name: DIY1
      run: |
        chmod +x diy-part1.sh
        cd openwrt
        ../diy-part1.sh

    # ======================
    # feeds
    # ======================
    - name: feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    # ======================
    # ⚙️ config
    # ======================
    - name: config
      run: |
        cd openwrt
        DEVICE=${{ github.event.inputs.device }}

        if [ "$DEVICE" = "wh3000" ]; then
          cp ../wh3000.config .config
        else
          cp ../wh3000pro.config .config
        fi

        cat >> .config <<EOF
        CONFIG_TESTING_KERNEL=y
        CONFIG_LINUX_6_6=y
        CONFIG_CCACHE=y
        EOF

    # ======================
    # DIY2
    # ======================
    - name: DIY2
      run: |
        chmod +x diy-part2.sh
        cd openwrt
        ../diy-part2.sh

    - name: defconfig
      run: |
        cd openwrt
        make defconfig

    # ======================
    # 🚀 DL缓存（永久级优化）
    # ======================
    - name: cache dl
      uses: actions/cache@v4
      with:
        path: openwrt/dl
        key: dl-v3-openwrt-global

    # ======================
    # 🚀 toolchain缓存（稳定）
    # ======================
    - name: cache toolchain
      uses: actions/cache@v4
      with:
        path: |
          openwrt/staging_dir/toolchain-*
          openwrt/staging_dir/host*
          openwrt/build_dir/host*
        key: toolchain-openwrt-v6-stable

    # ======================
    # 🚀 ccache缓存（关键加速）
    # ======================
    - name: cache ccache
      uses: actions/cache@v4
      with:
        path: ~/.ccache
        key: ccache-${{ github.event.inputs.device }}-v1
        restore-keys: |
          ccache-

    # ======================
    # 🚀 启用ccache
    # ======================
    - name: enable ccache
      run: |
        echo "export CC='ccache gcc'" >> $GITHUB_ENV
        echo "export CXX='ccache g++'" >> $GITHUB_ENV
        ccache -M 5G || true

    # ======================
    # 🚀 DL下载（只跑一次）
    # ======================
    - name: download dl
      run: |
        if [ ! -d openwrt/dl ] || [ -z "$(ls -A openwrt/dl)" ]; then
          cd openwrt
          make download -j8
        else
          echo "DL已命中缓存"
        fi

    # ======================
    # 🚀 极速编译核心
    # ======================
    - name: build
      run: |
        cd openwrt

        if [ "${{ github.event.inputs.clean_build }}" = "true" ]; then
          make -j$(nproc) V=s
        else
          echo ">>> 极速增量编译"
          make -j$(nproc) V=s || make -j1 V=s
        fi

    # ======================
    # 📦 打包
    # ======================
    - name: package
      run: |
        mkdir -p upload
        find openwrt/bin -type f \( -name "*.bin" -o -name "*.img.gz" \) \
          -exec cp {} upload/ \;

    - uses: actions/upload-artifact@v4
      with:
        name: firmware-${{ github.event.inputs.device }}
        path: upload/
