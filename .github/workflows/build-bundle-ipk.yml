name: Build IPTV Manager Bundle IPK

# 触发方式：
# 1. 推 tag：git tag bundle-v1.0.0 && git push origin bundle-v1.0.0
# 2. Actions 页面手动点「Run workflow」
on:
  push:
    tags: [ 'bundle-v*' ]
  workflow_dispatch:
    inputs:
      version:
        description: '版本号，例如 1.0.1'
        required: false
        default: '1.0.0'

permissions:
  contents: write

jobs:
  build-bundle:
    runs-on: ubuntu-latest

    env:
      # OpenWrt 23.05 SDK for MediaTek Filogic (MT7981 / WH3000 Pro / aarch64_cortex-a53)
      SDK_URL: >-
        https://downloads.openwrt.org/releases/23.05.5/targets/mediatek/filogic/
        openwrt-sdk-23.05.5-mediatek-filogic_gcc-12.3.0_musl.Linux-x86_64.tar.xz
      TARGET_ARCH: aarch64_cortex-a53

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            build-essential gawk unzip python3 \
            libncurses5-dev libssl-dev zlib1g-dev wget

      - name: Determine version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VER="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" == refs/tags/bundle-v* ]]; then
            VER="${{ github.ref_name }}"
            VER="${VER#bundle-v}"
          else
            VER="1.0.$(date +%Y%m%d%H%M)"
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "构建版本：$VER"

      - name: Download OpenWrt SDK
        run: |
          # 去掉 YAML 折行符号，拼成完整 URL
          SDK_URL=$(echo "$SDK_URL" | tr -d ' \n')
          echo "SDK URL: $SDK_URL"
          wget -q "$SDK_URL" -O sdk.tar.xz
          tar xf sdk.tar.xz
          mv openwrt-sdk-* sdk
          echo "SDK 解压完成"

      - name: Configure SDK feeds
        run: |
          cd sdk
          # 添加 rtp2httpd feed（stackia 原版）
          echo "src-git rtp2httpd https://github.com/stackia/rtp2httpd.git" \
            >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Add custom packages
        run: |
          cd sdk
          # msd_lite（ximiTech 版，基于 rtp2httpd）
          git clone --depth=1 \
            https://github.com/ximiTech/msd_lite \
            package/msd_lite

          # 我们的 LuCI 界面
          cp -r "$GITHUB_WORKSPACE/custom-packages/luci-app-iptv-manager" \
            package/luci-app-iptv-manager

      - name: Configure and compile packages
        run: |
          cd sdk

          # 启用三个包
          {
            echo "CONFIG_PACKAGE_rtp2httpd=y"
            echo "CONFIG_PACKAGE_msd_lite=y"
            echo "CONFIG_PACKAGE_luci-app-iptv-manager=y"
          } >> .config
          make defconfig

          # 编译（并行）
          echo "--- 编译 rtp2httpd ---"
          make package/rtp2httpd/compile -j$(nproc) V=s 2>&1 | tail -20

          echo "--- 编译 msd_lite ---"
          make package/msd_lite/compile -j$(nproc) V=s 2>&1 | tail -20

          echo "--- 编译 luci-app-iptv-manager ---"
          make package/luci-app-iptv-manager/compile -j$(nproc) V=s 2>&1 | tail -20

          # 收集产出 IPK
          mkdir -p "$GITHUB_WORKSPACE/built-ipks"
          find bin/packages -name "*.ipk" \
            | grep -E "(rtp2httpd|msd_lite|luci-app-iptv-manager)" \
            | while read -r f; do
                echo "  收集: $(basename "$f")"
                cp "$f" "$GITHUB_WORKSPACE/built-ipks/"
              done

          echo "--- 收集到的 IPK ---"
          ls -lh "$GITHUB_WORKSPACE/built-ipks/"

      - name: Bundle into single IPK
        run: |
          chmod +x custom-packages/build-bundle.sh
          custom-packages/build-bundle.sh \
            "${{ steps.ver.outputs.version }}" \
            "$TARGET_ARCH" \
            "$GITHUB_WORKSPACE/built-ipks" \
            "$GITHUB_WORKSPACE"

          echo "IPK_NAME=$(ls $GITHUB_WORKSPACE/iptv-manager-bundle_*.ipk \
            | xargs basename)" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: iptv-manager-bundle-${{ steps.ver.outputs.version }}
          path: "iptv-manager-bundle_*.ipk"
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/bundle-v')
        uses: softprops/action-gh-release@v2
        with:
          name: "IPTV Manager Bundle v${{ steps.ver.outputs.version }}"
          draft: false
          prerelease: false
          files: "iptv-manager-bundle_*.ipk"
          body: |
            ## IPTV Manager Bundle v${{ steps.ver.outputs.version }}

            **一键安装包**，包含 msd_lite 与 rtp2HTTPd 主程序及 LuCI 管理界面，无需单独安装依赖。

            ### 适用设备
            架构：`aarch64_cortex-a53`
            适用于 MediaTek Filogic / MT7981 平台（WH3000 Pro 等），以及其他运行此架构 OpenWrt/LEDE 的路由器。

            ### 安装方式
            将 IPK 文件上传到路由器后，SSH 执行：
            ```sh
            opkg install /tmp/iptv-manager-bundle_*.ipk
            ```
            安装完成后刷新浏览器，在「**服务**」→「**IPTV 管理**」进行配置。

            ### 卸载
            ```sh
            opkg remove iptv-manager-bundle
            ```

            ---

            ### 引用的开源项目

            本项目在编译时使用了以下开源项目的源代码，感谢原作者的贡献：

            | 组件 | 来源仓库 | 说明 |
            |---|---|---|
            | **rtp2httpd** | [stackia/rtp2httpd](https://github.com/stackia/rtp2httpd) | RTP/UDP 组播 → HTTP 代理，功能完整版 |
            | **msd_lite** | [ximiTech/msd_lite](https://github.com/ximiTech/msd_lite) | 轻量级组播转发，基于 rtp2httpd 定制 |
            | LuCI 界面 | 本仓库 | 二合一统一管理界面（新开发） |

            本项目 LuCI 界面部分为原创开发，主程序二进制编译自上述两个开源仓库，
            遵循各原项目的开源协议。
