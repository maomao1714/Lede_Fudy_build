name: Build IPTV Manager Bundle IPK

on:
  push:
    tags: [ 'bundle-v*' ]
  workflow_dispatch:
    inputs:
      version:
        description: '版本号，例如 1.0.1'
        required: false
        default: '1.0.0'

permissions:
  contents: write

jobs:
  build-bundle:
    # ubuntu-22.04 对 OpenWrt SDK 兼容性更好
    # ubuntu-latest 已是 24.04，libncurses5-dev 等包已废弃
    runs-on: ubuntu-22.04

    env:
      SDK_URL: "https://downloads.openwrt.org/releases/23.05.5/targets/mediatek/filogic/openwrt-sdk-23.05.5-mediatek-filogic_gcc-12.3.0_musl.Linux-x86_64.tar.xz"
      TARGET_ARCH: aarch64_cortex-a53

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            build-essential clang flex bison gawk \
            gcc-multilib g++-multilib gettext \
            libncurses-dev libssl-dev zlib1g-dev \
            libfl-dev pkgconf rsync \
            python3 python3-setuptools \
            unzip wget git

      - name: Determine version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VER="${{ github.event.inputs.version }}"
          elif [[ "${{ github.ref }}" == refs/tags/bundle-v* ]]; then
            VER="${{ github.ref_name }}"
            VER="${VER#bundle-v}"
          else
            VER="1.0.$(date +%Y%m%d%H%M)"
          fi
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "构建版本：$VER"

      - name: Download OpenWrt SDK
        run: |
          echo "下载 SDK..."
          wget -q "$SDK_URL" -O sdk.tar.xz
          tar xf sdk.tar.xz
          mv openwrt-sdk-* sdk
          echo "SDK 解压完成，目录：$(ls sdk/)"

      - name: Configure SDK feeds
        run: |
          cd sdk
          echo "src-git rtp2httpd https://github.com/stackia/rtp2httpd.git" \
            >> feeds.conf.default
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Add custom packages
        run: |
          cd sdk
          git clone --depth=1 \
            https://github.com/ximiTech/msd_lite \
            package/msd_lite

          cp -r "$GITHUB_WORKSPACE/custom-packages/luci-app-iptv-manager" \
            package/luci-app-iptv-manager

      - name: Configure and compile packages
        run: |
          cd sdk

          {
            echo "CONFIG_PACKAGE_rtp2httpd=y"
            echo "CONFIG_PACKAGE_msd_lite=y"
            echo "CONFIG_PACKAGE_luci-app-iptv-manager=y"
          } >> .config

          make defconfig

          echo "--- 编译 rtp2httpd ---"
          make package/rtp2httpd/compile -j$(nproc) V=s 2>&1 | tail -30

          echo "--- 编译 msd_lite ---"
          make package/msd_lite/compile -j$(nproc) V=s 2>&1 | tail -30

          echo "--- 编译 luci-app-iptv-manager ---"
          make package/luci-app-iptv-manager/compile -j$(nproc) V=s 2>&1 | tail -30

          mkdir -p "$GITHUB_WORKSPACE/built-ipks"
          find bin/packages -name "*.ipk" \
            | grep -E "(rtp2httpd|msd_lite|luci-app-iptv-manager)" \
            | while read -r f; do
                echo "  收集: $(basename "$f")"
                cp "$f" "$GITHUB_WORKSPACE/built-ipks/"
              done

          echo "--- 收集到的 IPK ---"
          ls -lh "$GITHUB_WORKSPACE/built-ipks/"

      - name: Bundle into single IPK
        run: |
          chmod +x custom-packages/build-bundle.sh
          custom-packages/build-bundle.sh \
            "${{ steps.ver.outputs.version }}" \
            "$TARGET_ARCH" \
            "$GITHUB_WORKSPACE/built-ipks" \
            "$GITHUB_WORKSPACE"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: iptv-manager-bundle-${{ steps.ver.outputs.version }}
          path: "iptv-manager-bundle_*.ipk"
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/bundle-v')
        uses: softprops/action-gh-release@v2
        with:
          name: "IPTV Manager Bundle v${{ steps.ver.outputs.version }}"
          draft: false
          prerelease: false
          files: "iptv-manager-bundle_*.ipk"
          body: |
            ## IPTV Manager Bundle v${{ steps.ver.outputs.version }}

            **一键安装包**，包含 msd_lite、rtp2HTTPd 主程序及 LuCI 管理界面。

            ### 适用设备
            架构：`aarch64_cortex-a53`（MediaTek Filogic / MT7981，WH3000 Pro 等）

            ### 安装方式
            ```sh
            opkg install /tmp/iptv-manager-bundle_*.ipk
            ```
            安装后刷新浏览器，「服务」→「IPTV 管理」。

            ### 卸载
            ```sh
            opkg remove iptv-manager-bundle
            ```

            ---

            ### 引用的开源项目

            | 组件 | 来源 | 说明 |
            |---|---|---|
            | **rtp2httpd** | [stackia/rtp2httpd](https://github.com/stackia/rtp2httpd) | RTP/UDP 组播 → HTTP 代理 |
            | **msd_lite** | [ximiTech/msd_lite](https://github.com/ximiTech/msd_lite) | 轻量级组播转发 |
            | **LuCI 界面** | 本仓库 | 二合一统一管理界面 |

            本项目 LuCI 界面为原创开发，主程序二进制编译自上述开源仓库，遵循各原项目开源协议。
