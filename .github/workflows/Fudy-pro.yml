name: Lede 固件 (华思飞 WH3000-pro)

on:
  workflow_dispatch:
    inputs:
      ssh:
        description: '是否开启SSH调试（通常选No）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
  # schedule:
  #   - cron: '0 18 * * 0'

env:
  REPO_URL: https://github.com/coolsnowwolf/lede
  REPO_BRANCH: master
  CONFIG_FILE: optimized.config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_RELEASE: true
  UPLOAD_ARTIFACTS: true
  TZ: Asia/Shanghai

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 释放磁盘空间
        run: |
          echo ">>> 释放前磁盘状态"
          df -hT
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL \
            /usr/local/share/boost \
            /usr/share/swift \
            /usr/local/share/chromium \
            /usr/share/miniconda \
            /usr/local/share/powershell \
            /usr/share/az_* \
            /opt/az \
            /usr/lib/jvm \
            /usr/lib/mono \
            /usr/local/julia* \
            "$AGENT_TOOLSDIRECTORY"
          sudo docker image prune --all --force 2>/dev/null || true
          sudo apt-get purge -y \
            azure-cli \
            google-cloud-cli \
            microsoft-edge-stable \
            google-chrome-stable \
            firefox \
            mono-devel \
            libgl1-mesa-dri \
            2>/dev/null || true
          sudo apt-get autoremove -y 2>/dev/null || true
          sudo apt-get autoclean 2>/dev/null || true
          echo ">>> 释放后磁盘状态"
          df -hT

      - name: 初始化编译环境
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo rm -rf /etc/apt/sources.list.d/*
          sudo -E apt-get -qq update
          sudo -E apt-get -qq install --no-install-recommends -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison \
            build-essential bzip2 ccache clang cmake cpio curl \
            device-tree-compiler ecj fastjar flex gawk gettext \
            gcc-multilib g++-multilib git gnutls-dev gperf haveged \
            help2man intltool jq lib32gcc-s1 libc6-dev-i386 libelf-dev \
            libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev \
            libncurses5-dev libncursesw5-dev libpython3-dev \
            libreadline-dev libssl-dev libtool libz-dev lld llvm lrzsz \
            mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf \
            python3 python3-pip python3-ply python3-pyelftools qemu-utils \
            re2c rsync scons squashfs-tools subversion swig texinfo \
            uglifyjs unzip vim wget xmlto xxd zlib1g-dev
          sudo -E apt-get -qq autoremove --purge
          sudo -E apt-get -qq clean
          sudo timedatectl set-timezone "$TZ"
          sudo mkdir -p /workdir
          sudo chown "$USER":"$GROUPS" /workdir
          echo ">>> 环境初始化完成，当前磁盘："
          df -hT

      - name: 克隆 LEDE 源码
        working-directory: /workdir
        run: |
          git clone "$REPO_URL" -b "$REPO_BRANCH" openwrt \
            --single-branch --depth=1
          ln -sf /workdir/openwrt "$GITHUB_WORKSPACE/openwrt"
          echo ">>> LEDE 源码克隆完成"

      - name: 执行 DIY 脚本第一部分（添加软件源）
        run: |
          chmod +x "$GITHUB_WORKSPACE/$DIY_P1_SH"
          cd openwrt
          "$GITHUB_WORKSPACE/$DIY_P1_SH"

      - name: 更新并安装软件包列表（含移除冲突包）
        run: |
          cd openwrt
          ./scripts/feeds update -a

          echo ">>> 删除 vsftpd 冲突包（install 前）"
          rm -rf feeds/qmodem/luci-app-vsftpd            2>/dev/null || true
          rm -rf feeds/luci/applications/luci-app-vsftpd 2>/dev/null || true
          rm -rf feeds/packages/net/vsftpd               2>/dev/null || true
          echo ">>> 剩余 vsftpd 相关目录："
          find feeds -maxdepth 5 -name "*vsftpd*" 2>/dev/null || echo "✅ 无残留"

          echo ">>> rtp2httpd feed 目录确认："
          find feeds -maxdepth 3 -name "*rtp2httpd*" 2>/dev/null || echo "⚠️ 未找到 rtp2httpd"

          ./scripts/feeds install -a
          echo ">>> feeds 安装完成"

      - name: 复制配置文件
        run: |
          [ -e files ] && mv files openwrt/files
          [ -e "$CONFIG_FILE" ] && cp "$CONFIG_FILE" openwrt/.config
          echo ">>> 配置文件已复制"

      - name: 执行 DIY 脚本第二部分（自定义设置）
        run: |
          chmod +x "$GITHUB_WORKSPACE/$DIY_P2_SH"
          cd openwrt
          "$GITHUB_WORKSPACE/$DIY_P2_SH"

      - name: SSH 远程调试（可选）
        uses: P3TERX/ssh2actions@v1.0.0
        if: github.event.inputs.ssh == 'true' && github.event_name == 'workflow_dispatch'
        env:
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

      - name: 加载配置
        run: |
          cd openwrt
          echo ">>> .config 前5行预览："
          head -5 .config
          make defconfig
          echo ">>> 确认 rtp2httpd 已在配置中："
          grep -i "rtp2httpd" .config || echo "⚠️ 警告：rtp2httpd 不在最终配置中"
          echo ">>> 当前差异配置："
          ./scripts/diffconfig.sh

      - name: 缓存下载目录
        uses: actions/cache@v4
        with:
          path: /workdir/openwrt/dl
          key: dl-lede-${{ hashFiles('**/optimized.config') }}-${{ github.run_id }}
          restore-keys: |
            dl-lede-${{ hashFiles('**/optimized.config') }}-
            dl-lede-

      - name: 下载编译依赖包
        run: |
          cd openwrt
          make download -j$(nproc)
          find dl -size -1024c -exec ls -l {} \;
          find dl -size -1024c -exec rm -f {} \;
          echo ">>> 依赖包下载完成，当前磁盘："
          df -hT

      - name: 编译固件
        id: compile
        run: |
          cd openwrt
          echo ">>> 开始编译，时间：$(date)  核心：$(nproc)"
          echo ">>> 编译前磁盘状态："
          df -hT

          if ! make -j$(nproc) 2>&1; then
            echo ""
            echo "========================================"
            echo "⚠️  多核编译失败，切换单核详细模式..."
            echo "========================================"
            make -j1 V=s 2>&1 | tail -100
            echo ""
            echo "========================================"
            echo "❌ 编译失败，以上为最后100行日志"
            echo "========================================"
            exit 1
          fi

          echo ">>> 编译完成，时间：$(date)"
          echo "status=success" >> "$GITHUB_OUTPUT"
          grep '^CONFIG_TARGET.*DEVICE.*=y' .config \
            | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
          [ -s DEVICE_NAME ] \
            && echo "DEVICE_NAME=$(cat DEVICE_NAME)" >> "$GITHUB_ENV"
          echo "FILE_DATE=$(date +"%Y%m%d%H%M")" >> "$GITHUB_ENV"

      - name: 检查磁盘空间
        if: "!cancelled()"
        run: df -hT

      - name: 整理固件文件
        id: organize
        if: steps.compile.outputs.status == 'success'
        run: |
          cd openwrt/bin/targets/*/*
          rm -rf packages
          echo "FIRMWARE=$PWD" >> "$GITHUB_ENV"
          echo "status=success" >> "$GITHUB_OUTPUT"

      - name: 上传固件到 Artifacts
        uses: actions/upload-artifact@v4
        if: steps.organize.outputs.status == 'success' && env.UPLOAD_ARTIFACTS == 'true'
        with:
          name: LEDE_WH3000_${{ env.FILE_DATE }}
          path: ${{ env.FIRMWARE }}
          retention-days: 90

      - name: 生成 Release 说明
        id: tag
        if: steps.organize.outputs.status == 'success' && env.UPLOAD_RELEASE == 'true'
        run: |
          TAG="$(date +"%Y.%m.%d-%H%M")"
          echo "release_tag=${TAG}" >> "$GITHUB_OUTPUT"
          cat > "$GITHUB_WORKSPACE/release.txt" << REOF
          📦 华思飞 WH3000 LEDE 固件

          🕒 编译时间：$(date +"%Y年%m月%d日 %H:%M")
          📱 目标平台：MediaTek Filogic MT7981 (eMMC)
          🔧 源码：coolsnowwolf/lede master | 内核：Linux 6.6 LTS

          ✅ 已包含功能：
          - LuCI Design 主题
          - Docker 容器支持
          - Lucky 内网穿透/DDNS
          - Qmodem 4G/5G 模块管理
          - OpenVPN 服务端
          - DDNS 阿里云/DNSPod
          - Samba4 文件共享
          - rtp2httpd IPTV 组播转单播
          - 带宽监控 / UPnP / WOL
          - WiFi 首次启动修复

          📌 刷机前请备份当前配置！
          REOF
          echo "status=success" >> "$GITHUB_OUTPUT"

      - name: 上传固件到 GitHub Release
        uses: softprops/action-gh-release@v2
        if: steps.tag.outputs.status == 'success'
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          body_path: ${{ github.workspace }}/release.txt
          files: ${{ env.FIRMWARE }}/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 清理旧的 Releases
        uses: dev-drprasad/delete-older-releases@v0.3.4
        if: env.UPLOAD_RELEASE == 'true'
        with:
          keep_latest: 5
          delete_tags: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
